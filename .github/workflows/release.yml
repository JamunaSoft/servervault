name: Release

# Builds release artifacts and opens a DRAFT GitHub release for review.
# Nothing is published automatically: a maintainer must edit and publish
# the draft manually from the GitHub UI once it looks correct.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (must already exist)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Resolve version metadata
        id: meta
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          VERSION: ${{ steps.meta.outputs.tag }}
          COMMIT: ${{ steps.meta.outputs.commit }}
          DATE: ${{ steps.meta.outputs.date }}
        run: |
          set -euo pipefail
          mkdir -p dist
          # TODO(internal/version): main.Version/Commit/Date are set directly on
          # the `main` package (see cmd/servervault/main.go) because there is no
          # internal/version package yet. Once one exists (see ROADMAP.md
          # v0.2.0-alpha "build metadata"), move these -X targets to
          # internal/version.Version/Commit/Date and update this ldflags string
          # and the one in Makefile together.
          ldflags="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT} -X main.Date=${DATE}"
          targets=(
            "linux amd64"
            "linux arm64"
          )
          for target in "${targets[@]}"; do
            read -r os arch <<< "$target"
            out="dist/servervault_${VERSION}_${os}_${arch}"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -ldflags "$ldflags" -o "$out" ./cmd/servervault
          done
          (cd dist && sha256sum servervault_* > checksums.txt)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: servervault-${{ steps.meta.outputs.tag }}
          path: dist/*

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            dist/*
