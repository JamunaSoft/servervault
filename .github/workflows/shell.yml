name: Shell

on:
  push:
    branches:
      - main
      - go-rewrite
    paths:
      - "bin/**"
      - "install.sh"
      - "**.sh"
      - ".github/workflows/shell.yml"
  pull_request:
    paths:
      - "bin/**"
      - "install.sh"
      - "**.sh"
      - ".github/workflows/shell.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: shell-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax:
    name: bash -n syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check script syntax
        run: |
          set -euo pipefail
          shopt -s nullglob
          scripts=(bin/* install.sh)
          for script in "${scripts[@]}"; do
            [[ -f "$script" ]] || continue
            echo "Checking $script"
            bash -n "$script"
          done

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          additional_files: "install.sh"
