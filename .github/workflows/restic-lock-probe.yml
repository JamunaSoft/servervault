name: Restic lock probe

# Opt-in, best-effort probe of restic's own repository-locking behavior
# under real concurrent backups (see docs/testing.md and
# internal/restic/lockprobe_test.go). Deliberately NOT triggered by push
# or pull_request: it is version-sensitive (polls restic's on-disk lock
# directory, an implementation detail) and not required for normal PRs.
# The deterministic version of this check --  that a restic exit code 11
# is classified correctly -- runs as a normal unit test in every PR via
# go.yml.

on:
  workflow_dispatch:
  schedule:
    # Weekly, Monday 05:00 UTC -- after the CodeQL scan, low collision
    # risk with other scheduled jobs.
    - cron: "0 5 * * 1"

permissions:
  contents: read

jobs:
  lock-probe:
    name: Restic lock-conflict probe
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true

      - name: Install restic
        run: sudo apt-get update && sudo apt-get install -y restic

      - name: Verify restic is usable
        run: restic version

      - name: Run the lock-conflict probe
        run: go test -tags=integration,resticlock -race -v ./internal/restic/...
