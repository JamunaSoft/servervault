version: "3"

vars:
  BINARY: servervault
  CMD_DIR: ./cmd/servervault
  VERSION_PKG: github.com/JamunaSoft/servervault/internal/version
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo none
  DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ

tasks:
  default:
    desc: Format, vet, test, and build.
    cmds:
      - task: fmt
      - task: vet
      - task: test
      - task: build

  fmt:
    desc: Format all Go source files.
    cmds:
      - gofmt -w .

  fmt:check:
    desc: Fail if any Go source file is not gofmt-formatted.
    cmds:
      - |
        unformatted="$(gofmt -l .)"
        if [[ -n "$unformatted" ]]; then
          echo "Not gofmt-formatted:"
          echo "$unformatted"
          exit 1
        fi

  vet:
    desc: Run go vet across the module.
    cmds:
      - go vet ./...

  test:
    desc: Run the Go test suite with race detection and coverage.
    cmds:
      - go test -race -cover ./...

  test:integration:
    desc: >-
      Real restic/pg_dump/pg_restore/psql against temporary local
      repositories/databases. Skips cleanly per-test when a prerequisite
      is missing locally; see docs/testing.md.
    cmds:
      - go test -tags=integration -race ./...

  test:resticlock:
    desc: >-
      Opt-in, best-effort probe of restic's own lock-conflict behavior
      against a real repository. Not part of test:integration;
      version-sensitive. See docs/testing.md.
    cmds:
      - go test -tags=integration,resticlock -race ./internal/restic/...

  build:
    desc: Build the servervault binary with version metadata.
    cmds:
      - >-
        go build -ldflags
        "-s -w -X {{.VERSION_PKG}}.Version={{.VERSION}} -X {{.VERSION_PKG}}.Commit={{.COMMIT}} -X {{.VERSION_PKG}}.Date={{.DATE}}"
        -o {{.BINARY}} {{.CMD_DIR}}

  clean:
    desc: Remove build artifacts.
    cmds:
      - rm -f {{.BINARY}}
      - rm -rf dist

  shellcheck:
    desc: Syntax-check and lint the shell implementation.
    cmds:
      - bash -n bin/* install.sh
      - shellcheck bin/* install.sh

  verify:
    desc: Run all checks required before committing.
    cmds:
      - task: fmt:check
      - task: vet
      - task: test
      - task: build
      - task: shellcheck

  run:
    desc: Build and run the CLI (pass args with -- ARGS).
    cmds:
      - task: build
      - ./{{.BINARY}} {{.CLI_ARGS}}
