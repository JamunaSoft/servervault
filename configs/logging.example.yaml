# ServerVault example logging configuration (Go rewrite).
#
# Copy this file, remove the .example suffix, and edit as needed.
# ServerVault logs with log/slog and never logs secret values
# (passwords, tokens, private keys) regardless of these settings.

logging:
  # "text" (human-readable, default) or "json" (structured, for log
  # shippers / journald / observability pipelines).
  format: "text"

  # One of: debug, info, warn, error.
  level: "info"

  # "stdout", "stderr", or an absolute file path.
  output: "stderr"

  # Include source file:line in each log entry. Useful for debugging,
  # noisy in production.
  add_source: false

  # Fields ServerVault attaches to relevant log entries automatically:
  # operation, duration, host, snapshot ID (when available). No
  # additional configuration is needed to enable these.
